<!DOCTYPE html>
<html>
<head>
    <title>Test Section Rendering</title>
</head>
<body>
    <div id="output"></div>
    
    <script>
        // Simulate a section object
        const section = {
            id: 1,
            title: 'Test Title',
            subtitle: 'Test Subtitle'
        };
        
        // This is how the function looks in the source
        function renderLicenseAvailability(section, config) {
            return `
                <section class="feature-section" data-section-id="${section.id}">
                    <h2>${section.title || 'Default Title'}</h2>
                    <p>${section.subtitle || 'Default Subtitle'}</p>
                </section>
            `;
        }
        
        // Test the rendering
        const html = renderLicenseAvailability(section, {});
        document.getElementById('output').innerHTML = html;
        
        console.log('Rendered HTML:', html);
    </script>
</body>
</html>
