<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Debug - Section Rendering Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body style="font-family: Arial, sans-serif; padding: 40px; background: #f5f5f5;">
    <h1>Section Rendering Debug</h1>
    <div id="status" style="margin: 20px 0; padding: 15px; background: white; border-radius: 8px;"></div>
    <div id="output" style="margin: 20px 0; padding: 20px; background: white; border-radius: 8px;"></div>
    
    <script>
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');
        
        statusDiv.innerHTML = '<p>🔄 Loading sections...</p>';
        
        // Test section rendering
        async function testRendering() {
            try {
                // Fetch sections from API
                const response = await axios.get('/api/homepage/sections');
                const sections = response.data.data.filter(s => s.is_enabled);
                
                statusDiv.innerHTML = `<p>✅ Loaded ${sections.length} sections</p>`;
                
                // Test rendering first section
                const firstSection = sections[0];
                statusDiv.innerHTML += `<p>📝 Testing section: ${firstSection.title} (${firstSection.section_type})</p>`;
                
                // Create a simple test render
                const testHTML = `
                    <div style="border: 2px solid #001f3f; padding: 20px; margin: 10px 0; border-radius: 8px;">
                        <h2 style="color: #001f3f;">Section: ${firstSection.title}</h2>
                        <p><strong>Type:</strong> ${firstSection.section_type}</p>
                        <p><strong>ID:</strong> ${firstSection.id}</p>
                        <p><strong>Subtitle:</strong> ${firstSection.subtitle || 'None'}</p>
                        <p><strong>Config:</strong> ${firstSection.config || '{}'}</p>
                    </div>
                `;
                
                outputDiv.innerHTML = testHTML;
                statusDiv.innerHTML += '<p>✅ Template literal evaluation working!</p>';
                
                // Test actual render function
                const section = firstSection;
                const renderTest = `
                    <div style="background: linear-gradient(135deg, #001f3f 0%, #003366 100%); color: white; padding: 40px; border-radius: 12px; margin-top: 20px;">
                        <h2 style="color: #FFC107;">${section.title}</h2>
                        <p>${section.subtitle}</p>
                        <p>Section ID: ${section.id}</p>
                    </div>
                `;
                
                outputDiv.innerHTML += renderTest;
                statusDiv.innerHTML += '<p>✅ Complex template rendering working!</p>';
                
            } catch (error) {
                statusDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }
        
        testRendering();
    </script>
</body>
</html>
