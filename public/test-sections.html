<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sections Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
</head>
<body>
    <h1>Sections Loading Test</h1>
    <div id="status">Loading...</div>
    <div id="dynamic-sections"></div>
    
    <script>
        console.log('Test page loaded');
        
        async function testLoad() {
            try {
                console.log('Fetching sections...');
                const response = await axios.get('/api/homepage/sections');
                console.log('Response:', response.data);
                
                const sections = response.data.data.filter(s => s.is_enabled);
                console.log('Enabled sections:', sections.length);
                
                document.getElementById('status').textContent = `Loaded ${sections.length} sections`;
                
                const container = document.getElementById('dynamic-sections');
                container.innerHTML = '';
                
                sections.forEach(section => {
                    const div = document.createElement('div');
                    div.style.padding = '10px';
                    div.style.margin = '5px';
                    div.style.border = '1px solid #ccc';
                    div.textContent = `${section.title} (${section.section_type})`;
                    container.appendChild(div);
                });
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
            }
        }
        
        document.addEventListener('DOMContentLoaded', testLoad);
    </script>
</body>
</html>
