<!DOCTYPE html>
<html>
<head>
    <title>Database Initialization</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-4">Database Initialization</h1>
        <p class="mb-4">Click the button below to initialize the database tables for product import.</p>
        
        <button onclick="initDB()" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">
            Initialize Database
        </button>
        
        <div id="result" class="mt-4"></div>
    </div>
    
    <script>
        async function initDB() {
            const result = document.getElementById('result');
            result.innerHTML = '<p class="text-blue-600">Initializing database...</p>';
            
            try {
                const response = await fetch('/api/admin/init-db');
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = `<p class="text-green-600">✅ ${data.message}</p>`;
                } else {
                    result.innerHTML = `<p class="text-red-600">❌ Error: ${data.error}</p>`;
                }
            } catch (error) {
                result.innerHTML = `<p class="text-red-600">❌ Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
